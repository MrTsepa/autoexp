# autoexp project configuration
# Defines what the agent can and cannot modify, and abort rules for training.

# Files the agent is allowed to modify (glob patterns)
editable_files:
  - "configs/*.yaml"
  - "src/**/*.py"

# Files the agent must NEVER modify (glob patterns)
locked_files:
  - "eval.py"
  - ".autoexp/*"

# Abort rules — kill training if these conditions are met
# Each rule monitors stdout for a pattern and checks a numeric value
abort_rules: []
  # Example:
  # - pattern: "loss"
  #   condition: "above"       # "above" or "below"
  #   threshold: 100.0
  #   after_lines: 500         # only check after N lines of output
